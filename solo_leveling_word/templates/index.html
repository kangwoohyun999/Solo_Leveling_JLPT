<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoloLeveling Word</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a26;
  --border: #2a2a3a;
  --accent: #6c63ff;
  --accent2: #a78bfa;
  --text: #e8e8f0;
  --text-muted: #6b6b8a;
  --danger: #ff4d6d;
  --success: #22d3a0;
  --warning: #fbbf24;
  --radius: 10px;
  --mono: 'Share Tech Mono', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; background:var(--bg); color:var(--text); font-family:'Noto Sans KR', sans-serif; }
button { cursor:pointer; font-family:inherit; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

/* ── Screen system ── */
.screen { display:none; min-height:100vh; }
.screen.active { display:flex; flex-direction:column; }

/* ══════════════════════════════
   AUTH SCREEN
══════════════════════════════ */
#auth-screen {
  align-items:center; justify-content:center;
  background: radial-gradient(ellipse at 50% 0%, #1a1040 0%, var(--bg) 70%);
}
.auth-box {
  width:100%; max-width:400px; padding:0 24px;
}
.auth-logo {
  text-align:center; margin-bottom:40px;
}
.auth-logo .logo-icon {
  width:56px; height:56px; background:var(--accent);
  border-radius:14px; display:inline-flex; align-items:center; justify-content:center;
  font-size:28px; margin-bottom:12px;
  box-shadow: 0 0 30px rgba(108,99,255,0.4);
}
.auth-logo h1 { font-size:22px; font-weight:700; letter-spacing:0.05em; }
.auth-logo p { color:var(--text-muted); font-size:13px; margin-top:4px; }

.auth-tabs { display:flex; gap:0; margin-bottom:28px; background:var(--surface); border-radius:var(--radius); padding:4px; }
.auth-tab { flex:1; padding:10px; text-align:center; border:none; background:transparent; color:var(--text-muted); font-size:14px; border-radius:8px; transition:all .2s; }
.auth-tab.active { background:var(--accent); color:#fff; }

.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:12px; color:var(--text-muted); margin-bottom:6px; letter-spacing:.05em; text-transform:uppercase; }
.form-group input {
  width:100%; padding:12px 16px; background:var(--surface);
  border:1px solid var(--border); border-radius:var(--radius);
  color:var(--text); font-size:15px; font-family:inherit;
  transition:border-color .2s;
}
.form-group input:focus { outline:none; border-color:var(--accent); }

.btn-primary {
  width:100%; padding:14px; background:var(--accent);
  border:none; border-radius:var(--radius); color:#fff;
  font-size:15px; font-weight:700; letter-spacing:.05em;
  transition:all .2s; margin-top:8px;
}
.btn-primary:hover { background:#7c74ff; transform:translateY(-1px); }
.btn-primary:active { transform:translateY(0); }

.auth-error { color:var(--danger); font-size:13px; margin-top:10px; text-align:center; min-height:18px; }

/* ══════════════════════════════
   MAIN SCREEN
══════════════════════════════ */
#main-screen { overflow-y:auto; }

/* Top Nav */
.top-nav {
  position:sticky; top:0; z-index:100;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 24px; height:60px;
  background:rgba(10,10,15,0.92); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.nav-logo { display:flex; align-items:center; gap:10px; }
.nav-logo .logo-sm {
  width:32px; height:32px; background:var(--accent);
  border-radius:8px; display:flex; align-items:center; justify-content:center;
  font-size:16px;
}
.nav-title { font-size:16px; font-weight:700; letter-spacing:.08em; }

.nav-menu-btn {
  width:38px; height:38px; background:var(--surface);
  border:1px solid var(--border); border-radius:8px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px;
}
.nav-menu-btn span { display:block; width:16px; height:2px; background:var(--text); border-radius:1px; }

/* Main content */
.main-content { flex:1; padding:40px 24px 60px; max-width:600px; margin:0 auto; width:100%; }
.main-greeting { margin-bottom:36px; }
.main-greeting h2 { font-size:22px; font-weight:700; }
.main-greeting p { color:var(--text-muted); font-size:14px; margin-top:4px; }

.level-grid { display:flex; flex-direction:column; gap:12px; }
.level-btn {
  width:100%; padding:22px 28px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); text-align:left;
  display:flex; align-items:center; justify-content:space-between;
  transition:all .2s;
}
.level-btn:hover { border-color:var(--accent); background:var(--surface2); transform:translateX(4px); }
.level-btn .lbtn-left { display:flex; align-items:center; gap:16px; }
.level-btn .lbtn-badge {
  width:44px; height:44px; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:14px; font-family:var(--mono);
}
.level-btn.renke .lbtn-badge { background:rgba(251,191,36,.12); color:var(--warning); }
.level-btn.n5 .lbtn-badge    { background:rgba(34,211,160,.12); color:var(--success); }
.level-btn.n4 .lbtn-badge    { background:rgba(108,99,255,.12); color:var(--accent2); }
.level-btn.n3 .lbtn-badge    { background:rgba(167,139,250,.12); color:var(--accent2); }
.level-btn.n2 .lbtn-badge    { background:rgba(255,77,109,.12); color:var(--danger); }
.level-btn.n1 .lbtn-badge    { background:rgba(255,77,109,.2); color:var(--danger); }
.level-btn .lbtn-info h3 { font-size:16px; font-weight:700; }
.level-btn .lbtn-info p { font-size:13px; color:var(--text-muted); margin-top:2px; }
.level-btn .lbtn-arrow { color:var(--text-muted); font-size:20px; }
.coming-soon { opacity:.45; pointer-events:none; }

/* ══════════════════════════════
   DROPDOWN MENU (목록)
══════════════════════════════ */
.dropdown-overlay {
  display:none; position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,.5); backdrop-filter:blur(4px);
}
.dropdown-overlay.open { display:block; }
.dropdown-panel {
  position:absolute; top:0; right:0; width:260px; height:100%;
  background:var(--surface); border-left:1px solid var(--border);
  padding:60px 0 0;
  display:flex; flex-direction:column;
}
.dropdown-close {
  position:absolute; top:16px; right:16px;
  width:32px; height:32px; background:var(--border);
  border:none; border-radius:50%; color:var(--text); font-size:16px;
}
.dropdown-user { padding:20px 24px; border-bottom:1px solid var(--border); }
.dropdown-user .d-nickname { font-size:16px; font-weight:700; }
.dropdown-user .d-username { font-size:12px; color:var(--text-muted); margin-top:2px; }
.dropdown-item {
  padding:16px 24px; display:flex; align-items:center; gap:12px;
  background:none; border:none; color:var(--text); font-size:15px; text-align:left; width:100%;
  transition:background .15s;
}
.dropdown-item:hover { background:var(--surface2); }
.dropdown-item .d-icon { font-size:18px; width:24px; }
.dropdown-logout { margin-top:auto; border-top:1px solid var(--border); color:var(--danger) !important; }

/* ══════════════════════════════
   WORD LIST SCREEN
══════════════════════════════ */
#wordlist-screen { overflow-y:auto; }
.page-header {
  position:sticky; top:0; z-index:50;
  display:flex; align-items:center; gap:16px; padding:0 20px; height:56px;
  background:rgba(10,10,15,.95); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.back-btn {
  width:36px; height:36px; background:var(--surface);
  border:1px solid var(--border); border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-size:16px; color:var(--text);
}
.page-title { font-size:17px; font-weight:700; font-family:var(--mono); }
.page-count { font-size:13px; color:var(--text-muted); margin-left:auto; }

.word-list-container { padding:16px 16px 80px; }
.word-card {
  display:grid; grid-template-columns:1fr 1.2fr 1fr;
  align-items:center; gap:12px;
  padding:14px 18px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); margin-bottom:8px;
  transition:border-color .15s;
}
.word-card:hover { border-color:var(--accent); }
.wc-word { font-family:'Noto Sans JP', sans-serif; font-size:18px; font-weight:700; }
.wc-hira { font-family:'Noto Sans JP', sans-serif; font-size:13px; color:var(--text-muted); text-align:center; }
.wc-meaning { font-size:14px; text-align:right; color:var(--accent2); }

/* Q Button */
.q-fab {
  position:fixed; bottom:28px; right:28px; z-index:60;
  width:52px; height:52px; border-radius:50%;
  background:var(--accent); border:none; color:#fff;
  font-size:18px; font-weight:700; font-family:var(--mono);
  box-shadow: 0 4px 20px rgba(108,99,255,.5);
  transition:all .2s;
}
.q-fab:hover { transform:scale(1.1); box-shadow:0 6px 28px rgba(108,99,255,.7); }

/* ══════════════════════════════
   QUIZ COUNT SCREEN
══════════════════════════════ */
#quiz-count-screen {
  align-items:center; justify-content:center;
  background:radial-gradient(ellipse at 50% 30%, #1a1040 0%, var(--bg) 70%);
}
.quiz-count-box { width:100%; max-width:360px; padding:0 24px; }
.quiz-count-box h2 { font-size:22px; font-weight:700; margin-bottom:8px; }
.quiz-count-box p { color:var(--text-muted); font-size:14px; margin-bottom:32px; }

.count-options { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
.count-opt {
  padding:20px; background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); text-align:center;
  font-size:20px; font-weight:700; font-family:var(--mono);
  transition:all .2s; color:var(--text);
}
.count-opt:hover, .count-opt.selected { border-color:var(--accent); background:rgba(108,99,255,.1); color:var(--accent2); }
.count-opt small { display:block; font-size:11px; color:var(--text-muted); font-family:'Noto Sans KR'; margin-top:4px; font-weight:400; }

.custom-count-row { display:flex; gap:8px; align-items:center; }
.custom-count-row input {
  flex:1; padding:12px 16px; background:var(--surface);
  border:1px solid var(--border); border-radius:var(--radius);
  color:var(--text); font-size:16px; font-family:var(--mono);
}
.custom-count-row input:focus { outline:none; border-color:var(--accent); }

/* ══════════════════════════════
   QUIZ SCREEN
══════════════════════════════ */
#quiz-screen { overflow-y:auto; }
.quiz-progress-bar { height:3px; background:var(--border); }
.quiz-progress-fill { height:100%; background:var(--accent); transition:width .3s; }
.quiz-header { padding:16px 20px; display:flex; align-items:center; gap:12px; }
.quiz-no { font-size:13px; color:var(--text-muted); font-family:var(--mono); }
.quiz-back { background:none; border:none; color:var(--text-muted); font-size:20px; margin-left:auto; }

.quiz-card-area {
  flex:1; padding:20px 20px 0;
  display:flex; flex-direction:column; align-items:center;
}
.quiz-word-box {
  width:100%; max-width:500px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:16px; padding:48px 32px;
  text-align:center; min-height:200px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  margin-bottom:28px;
}
.quiz-word { font-family:'Noto Sans JP', sans-serif; font-size:52px; font-weight:700; margin-bottom:12px; line-height:1; }
.quiz-hira { font-family:'Noto Sans JP', sans-serif; font-size:18px; color:var(--text-muted); }

.quiz-choices { width:100%; max-width:500px; padding:0 0 32px; }
.choice-btn {
  width:100%; padding:18px 24px; margin-bottom:10px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); color:var(--text);
  font-size:16px; text-align:left;
  transition:all .15s;
}
.choice-btn:hover:not(:disabled) { border-color:var(--accent); background:var(--surface2); }
.choice-btn.correct { border-color:var(--success) !important; background:rgba(34,211,160,.1) !important; color:var(--success) !important; }
.choice-btn.wrong   { border-color:var(--danger) !important; background:rgba(255,77,109,.1) !important; color:var(--danger) !important; }
.choice-btn:disabled { cursor:not-allowed; }

/* ══════════════════════════════
   RESULT SCREEN
══════════════════════════════ */
#result-screen {
  align-items:center; justify-content:center;
  background:radial-gradient(ellipse at 50% 30%, #0d1a30 0%, var(--bg) 70%);
  overflow-y:auto;
}
.result-box { width:100%; max-width:400px; padding:40px 24px; text-align:center; }
.result-score-ring {
  width:120px; height:120px; margin:0 auto 24px;
  border-radius:50%; background:conic-gradient(var(--accent) var(--pct), var(--surface) 0);
  display:flex; align-items:center; justify-content:center;
  position:relative;
}
.result-score-ring::before {
  content:''; position:absolute; inset:10px;
  background:var(--bg); border-radius:50%;
}
.result-score-ring span { position:relative; font-size:28px; font-weight:700; font-family:var(--mono); }
.result-title { font-size:22px; font-weight:700; margin-bottom:8px; }
.result-sub { color:var(--text-muted); font-size:14px; margin-bottom:32px; }
.result-wrong-list { text-align:left; margin-bottom:28px; }
.result-wrong-list h3 { font-size:14px; color:var(--text-muted); margin-bottom:12px; letter-spacing:.05em; }
.rwl-item {
  display:grid; grid-template-columns:1fr 1.2fr 1fr;
  gap:8px; padding:12px 16px; background:var(--surface);
  border:1px solid var(--border); border-radius:8px; margin-bottom:6px;
  font-size:13px;
}
.rwl-word { font-family:'Noto Sans JP', sans-serif; font-weight:700; }
.rwl-hira { font-family:'Noto Sans JP', sans-serif; color:var(--text-muted); text-align:center; }
.rwl-meaning { text-align:right; color:var(--accent2); }
.btn-secondary {
  width:100%; padding:13px; background:transparent;
  border:1px solid var(--border); border-radius:var(--radius);
  color:var(--text); font-size:15px; margin-bottom:10px; transition:all .2s;
}
.btn-secondary:hover { border-color:var(--accent); }

/* ══════════════════════════════
   ACCOUNT SCREEN
══════════════════════════════ */
#account-screen { overflow-y:auto; }
.account-form { padding:24px 20px 60px; max-width:480px; margin:0 auto; }
.account-avatar {
  width:64px; height:64px; background:var(--accent);
  border-radius:16px; display:flex; align-items:center; justify-content:center;
  font-size:28px; margin:0 auto 20px;
}
.section-label { font-size:12px; color:var(--text-muted); letter-spacing:.1em; text-transform:uppercase; margin-bottom:12px; margin-top:24px; }
.info-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px; background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); margin-bottom:8px;
}
.info-row .ir-label { font-size:13px; color:var(--text-muted); }
.info-row .ir-value { font-size:15px; font-weight:600; }

/* ══════════════════════════════
   WRONGNOTE SCREEN
══════════════════════════════ */
#wrongnote-screen { overflow-y:auto; }
.wrongnote-list { padding:16px 16px 60px; }
.wn-card {
  display:grid; grid-template-columns:1fr 1.2fr 1fr auto;
  align-items:center; gap:10px;
  padding:14px 16px; background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); margin-bottom:8px;
}
.wn-del { background:none; border:none; color:var(--text-muted); font-size:16px; padding:4px; transition:color .15s; }
.wn-del:hover { color:var(--danger); }
.empty-state { text-align:center; padding:60px 20px; color:var(--text-muted); }
.empty-state .es-icon { font-size:40px; margin-bottom:12px; }

/* ══════════════════════════════
   TOAST
══════════════════════════════ */
.toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px);
  background:var(--surface2); border:1px solid var(--border);
  padding:12px 20px; border-radius:10px; font-size:14px;
  transition:transform .3s; z-index:999; white-space:nowrap;
}
.toast.show { transform:translateX(-50%) translateY(0); }
.toast.success { border-color:var(--success); color:var(--success); }
.toast.error   { border-color:var(--danger); color:var(--danger); }
</style>
</head>
<body>

<!-- ══ AUTH SCREEN ══ -->
<div id="auth-screen" class="screen active">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="logo-icon">⚔</div>
      <h1>SoloLeveling Word</h1>
      <p>일본어 단어 정복 플랫폼</p>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">로그인</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">회원가입</button>
    </div>
    <!-- Login -->
    <div id="login-form">
      <div class="form-group">
        <label>아이디</label>
        <input type="text" id="login-username" placeholder="아이디 입력" autocomplete="username">
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="login-password" placeholder="비밀번호 입력" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn-primary" onclick="doLogin()">로그인</button>
      <div class="auth-error" id="login-error"></div>
    </div>
    <!-- Register -->
    <div id="register-form" style="display:none">
      <div class="form-group">
        <label>아이디</label>
        <input type="text" id="reg-username" placeholder="영문 + 숫자, 4자 이상">
      </div>
      <div class="form-group">
        <label>닉네임</label>
        <input type="text" id="reg-nickname" placeholder="표시될 이름">
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="reg-password" placeholder="8자 이상" onkeydown="if(event.key==='Enter')doRegister()">
      </div>
      <button class="btn-primary" onclick="doRegister()">회원가입</button>
      <div class="auth-error" id="reg-error"></div>
    </div>
  </div>
</div>

<!-- ══ MAIN SCREEN ══ -->
<div id="main-screen" class="screen">
  <nav class="top-nav">
    <div class="nav-logo">
      <div class="logo-sm">⚔</div>
      <span class="nav-title">SoloLeveling Word</span>
    </div>
    <button class="nav-menu-btn" onclick="openMenu()">
      <span></span><span></span><span></span>
    </button>
  </nav>
  <div class="main-content">
    <div class="main-greeting">
      <h2 id="main-nickname">안녕하세요!</h2>
      <p>오늘도 단어 정복을 시작해볼까요?</p>
    </div>
    <div class="level-grid">
      <button class="level-btn renke coming-soon">
        <div class="lbtn-left">
          <div class="lbtn-badge">連</div>
          <div class="lbtn-info"><h3>연계</h3><p>Coming Soon</p></div>
        </div>
        <span class="lbtn-arrow">›</span>
      </button>
      <button class="level-btn n5" onclick="gotoWordList('N5')">
        <div class="lbtn-left">
          <div class="lbtn-badge">N5</div>
          <div class="lbtn-info"><h3>JLPT N5</h3><p>664개 단어 · 입문</p></div>
        </div>
        <span class="lbtn-arrow">›</span>
      </button>
      <button class="level-btn n4 coming-soon">
        <div class="lbtn-left">
          <div class="lbtn-badge">N4</div>
          <div class="lbtn-info"><h3>JLPT N4</h3><p>Coming Soon</p></div>
        </div>
        <span class="lbtn-arrow">›</span>
      </button>
      <button class="level-btn n3 coming-soon">
        <div class="lbtn-left">
          <div class="lbtn-badge">N3</div>
          <div class="lbtn-info"><h3>JLPT N3</h3><p>Coming Soon</p></div>
        </div>
        <span class="lbtn-arrow">›</span>
      </button>
      <button class="level-btn n2 coming-soon">
        <div class="lbtn-left">
          <div class="lbtn-badge">N2</div>
          <div class="lbtn-info"><h3>JLPT N2</h3><p>Coming Soon</p></div>
        </div>
        <span class="lbtn-arrow">›</span>
      </button>
      <button class="level-btn n1 coming-soon">
        <div class="lbtn-left">
          <div class="lbtn-badge">N1</div>
          <div class="lbtn-info"><h3>JLPT N1</h3><p>Coming Soon</p></div>
        </div>
        <span class="lbtn-arrow">›</span>
      </button>
    </div>
  </div>
</div>

<!-- ══ DROPDOWN MENU ══ -->
<div id="menu-overlay" class="dropdown-overlay" onclick="closeMenu()">
  <div class="dropdown-panel" onclick="event.stopPropagation()">
    <button class="dropdown-close" onclick="closeMenu()">✕</button>
    <div class="dropdown-user">
      <div class="d-nickname" id="menu-nickname">—</div>
      <div class="d-username" id="menu-username">—</div>
    </div>
    <button class="dropdown-item" onclick="gotoAccount()">
      <span class="d-icon">👤</span> 계정 정보
    </button>
    <button class="dropdown-item" onclick="gotoWrongNote()">
      <span class="d-icon">📝</span> 오답노트
    </button>
    <button class="dropdown-item dropdown-logout" onclick="doLogout()">
      <span class="d-icon">🚪</span> 로그아웃
    </button>
  </div>
</div>

<!-- ══ WORD LIST SCREEN ══ -->
<div id="wordlist-screen" class="screen">
  <div class="page-header">
    <button class="back-btn" onclick="showScreen('main-screen')">‹</button>
    <span class="page-title" id="wordlist-title">N5</span>
    <span class="page-count" id="wordlist-count"></span>
  </div>
  <div class="word-list-container" id="word-list-container"></div>
  <button class="q-fab" onclick="gotoQuizCount()">Q</button>
</div>

<!-- ══ QUIZ COUNT SCREEN ══ -->
<div id="quiz-count-screen" class="screen">
  <div class="quiz-count-box">
    <h2>문제 수 선택</h2>
    <p id="quiz-count-desc">몇 개의 단어를 풀까요?</p>
    <div class="count-options">
      <button class="count-opt" onclick="selectCount(10)">10<small>입문</small></button>
      <button class="count-opt" onclick="selectCount(20)">20<small>기본</small></button>
      <button class="count-opt" onclick="selectCount(30)">30<small>도전</small></button>
      <button class="count-opt" onclick="selectCount(50)">50<small>고난이도</small></button>
    </div>
    <div class="custom-count-row">
      <input type="number" id="custom-count" placeholder="직접 입력" min="1" max="664">
      <button class="btn-primary" style="width:auto;padding:12px 20px" onclick="startQuizCustom()">시작</button>
    </div>
    <div style="margin-top:16px">
      <button class="btn-secondary" onclick="showScreen('wordlist-screen')">‹ 돌아가기</button>
    </div>
  </div>
</div>

<!-- ══ QUIZ SCREEN ══ -->
<div id="quiz-screen" class="screen">
  <div class="quiz-progress-bar">
    <div class="quiz-progress-fill" id="quiz-progress" style="width:0%"></div>
  </div>
  <div class="quiz-header">
    <span class="quiz-no" id="quiz-no">1 / 10</span>
    <button class="quiz-back" onclick="confirmQuitQuiz()">✕</button>
  </div>
  <div class="quiz-card-area">
    <div class="quiz-word-box">
      <div class="quiz-word" id="quiz-word">—</div>
      <div class="quiz-hira" id="quiz-hira">—</div>
    </div>
    <div class="quiz-choices" id="quiz-choices"></div>
  </div>
</div>

<!-- ══ RESULT SCREEN ══ -->
<div id="result-screen" class="screen">
  <div class="result-box">
    <div class="result-score-ring" id="result-ring" style="--pct:0deg">
      <span id="result-score-text">0%</span>
    </div>
    <h2 class="result-title" id="result-title">결과</h2>
    <p class="result-sub" id="result-sub"></p>
    <div class="result-wrong-list" id="result-wrong-list"></div>
    <button class="btn-primary" onclick="retryQuiz()">다시 풀기</button>
    <button class="btn-secondary" onclick="showScreen('wordlist-screen')">단어장으로</button>
    <button class="btn-secondary" onclick="showScreen('main-screen')">메인으로</button>
  </div>
</div>

<!-- ══ ACCOUNT SCREEN ══ -->
<div id="account-screen" class="screen">
  <div class="page-header">
    <button class="back-btn" onclick="closeMenu(); showScreen('main-screen')">‹</button>
    <span class="page-title">계정 정보</span>
  </div>
  <div class="account-form">
    <div class="account-avatar">👤</div>
    <div class="section-label">기본 정보</div>
    <div class="info-row">
      <span class="ir-label">아이디</span>
      <span class="ir-value" id="acc-username">—</span>
    </div>
    <div class="section-label">닉네임 변경</div>
    <div class="form-group">
      <input type="text" id="acc-nickname" placeholder="새 닉네임">
    </div>
    <div class="section-label">비밀번호 변경</div>
    <div class="form-group">
      <label>현재 비밀번호</label>
      <input type="password" id="acc-cur-pw" placeholder="현재 비밀번호">
    </div>
    <div class="form-group">
      <label>새 비밀번호</label>
      <input type="password" id="acc-new-pw" placeholder="새 비밀번호 (8자 이상)">
    </div>
    <button class="btn-primary" onclick="saveAccount()" style="margin-top:8px">저장</button>
  </div>
</div>

<!-- ══ WRONGNOTE SCREEN ══ -->
<div id="wrongnote-screen" class="screen">
  <div class="page-header">
    <button class="back-btn" onclick="closeMenu(); showScreen('main-screen')">‹</button>
    <span class="page-title">오답노트</span>
    <span class="page-count" id="wrongnote-count"></span>
  </div>
  <div class="wrongnote-list" id="wrongnote-list"></div>
</div>

<!-- ══ TOAST ══ -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
let currentUser = null;
let currentLevel = 'N5';
let quizQuestions = [];
let quizIndex = 0;
let quizWrong = [];
let quizCount = 10;

// ═══════════════════════════════════════
//  SCREEN
// ═══════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) { el.classList.add('active'); el.scrollTop = 0; }
}

// ═══════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════
let toastTimer;
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type;
  clearTimeout(toastTimer);
  requestAnimationFrame(() => { t.classList.add('show'); });
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

// ═══════════════════════════════════════
//  API
// ═══════════════════════════════════════
async function api(method, path, body) {
  const opts = { method, headers:{'Content-Type':'application/json'}, credentials:'include' };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.detail || '오류가 발생했습니다');
  return data;
}

// ═══════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1)));
  document.getElementById('login-form').style.display = tab==='login' ? '' : 'none';
  document.getElementById('register-form').style.display = tab==='register' ? '' : 'none';
}

async function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  if (!username || !password) { errEl.textContent = '아이디와 비밀번호를 입력하세요'; return; }
  try {
    const data = await api('POST', '/api/login', { username, password });
    currentUser = { username, nickname: data.nickname };
    enterMain();
  } catch(e) { errEl.textContent = e.message; }
}

async function doRegister() {
  const username = document.getElementById('reg-username').value.trim();
  const nickname = document.getElementById('reg-nickname').value.trim();
  const password = document.getElementById('reg-password').value;
  const errEl = document.getElementById('reg-error');
  errEl.textContent = '';
  if (!username || !nickname || !password) { errEl.textContent = '모든 항목을 입력하세요'; return; }
  if (username.length < 4) { errEl.textContent = '아이디는 4자 이상이어야 합니다'; return; }
  if (password.length < 8) { errEl.textContent = '비밀번호는 8자 이상이어야 합니다'; return; }
  try {
    await api('POST', '/api/register', { username, password, nickname });
    showToast('회원가입 성공! 로그인해주세요', 'success');
    switchAuthTab('login');
    document.getElementById('login-username').value = username;
  } catch(e) { errEl.textContent = e.message; }
}

async function doLogout() {
  await api('POST', '/api/logout').catch(()=>{});
  currentUser = null;
  closeMenu();
  showScreen('auth-screen');
}

function enterMain() {
  const nick = currentUser?.nickname || '유저';
  document.getElementById('main-nickname').textContent = nick + '님, 안녕하세요!';
  document.getElementById('menu-nickname').textContent = nick;
  document.getElementById('menu-username').textContent = currentUser?.username || '';
  showScreen('main-screen');
}

// 페이지 로드 시 로그인 상태 확인
(async () => {
  try {
    const data = await api('GET', '/api/me');
    currentUser = { username: data.username, nickname: data.nickname };
    enterMain();
  } catch {}
})();

// ═══════════════════════════════════════
//  MENU
// ═══════════════════════════════════════
function openMenu() { document.getElementById('menu-overlay').classList.add('open'); }
function closeMenu() { document.getElementById('menu-overlay').classList.remove('open'); }

// ═══════════════════════════════════════
//  WORD LIST
// ═══════════════════════════════════════
async function gotoWordList(level) {
  currentLevel = level;
  document.getElementById('wordlist-title').textContent = level;
  document.getElementById('word-list-container').innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted)">불러오는 중...</div>';
  showScreen('wordlist-screen');
  try {
    const data = await api('GET', `/api/words/${level.toLowerCase()}`);
    document.getElementById('wordlist-count').textContent = data.total + '개';
    renderWordList(data.words);
  } catch(e) { showToast(e.message, 'error'); }
}

function renderWordList(words) {
  const container = document.getElementById('word-list-container');
  container.innerHTML = words.map(w => `
    <div class="word-card">
      <div class="wc-word">${w.word}</div>
      <div class="wc-hira">${w.hiragana}</div>
      <div class="wc-meaning">${w.meaning}</div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════
//  QUIZ
// ═══════════════════════════════════════
function gotoQuizCount() {
  document.getElementById('quiz-count-desc').textContent = `${currentLevel} 단어에서 문제를 출제합니다`;
  showScreen('quiz-count-screen');
}

function selectCount(n) {
  document.querySelectorAll('.count-opt').forEach(b => b.classList.remove('selected'));
  event.target.closest('.count-opt').classList.add('selected');
  startQuiz(n);
}

function startQuizCustom() {
  const v = parseInt(document.getElementById('custom-count').value);
  if (!v || v < 1) { showToast('1개 이상 입력하세요', 'error'); return; }
  startQuiz(v);
}

async function startQuiz(count) {
  quizCount = count;
  try {
    const data = await api('GET', `/api/quiz/${currentLevel.toLowerCase()}?count=${count}`);
    quizQuestions = data.questions;
    quizIndex = 0;
    quizWrong = [];
    showScreen('quiz-screen');
    renderQuestion();
  } catch(e) { showToast(e.message, 'error'); }
}

function renderQuestion() {
  const q = quizQuestions[quizIndex];
  const pct = Math.round((quizIndex / quizQuestions.length) * 100);
  document.getElementById('quiz-progress').style.width = pct + '%';
  document.getElementById('quiz-no').textContent = `${quizIndex + 1} / ${quizQuestions.length}`;
  document.getElementById('quiz-word').textContent = q.word;
  document.getElementById('quiz-hira').textContent = q.hiragana;
  const choicesEl = document.getElementById('quiz-choices');
  choicesEl.innerHTML = q.choices.map(c => `
    <button class="choice-btn" onclick="answerQuiz('${c.replace(/'/g,"\\'")}', this)">${c}</button>
  `).join('');
}

function answerQuiz(chosen, btn) {
  const q = quizQuestions[quizIndex];
  const correct = q.answer;
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add('correct');
  });
  if (chosen !== correct) {
    btn.classList.add('wrong');
    quizWrong.push(q);
    // 오답노트 자동 추가
    api('POST', '/api/wrongnote', { word: q.word, hiragana: q.hiragana, meaning: q.answer, level: currentLevel }).catch(()=>{});
  }
  setTimeout(() => {
    quizIndex++;
    if (quizIndex < quizQuestions.length) renderQuestion();
    else showResult();
  }, 900);
}

function showResult() {
  const total = quizQuestions.length;
  const correct = total - quizWrong.length;
  const pct = Math.round((correct / total) * 100);
  document.getElementById('quiz-progress').style.width = '100%';

  const ring = document.getElementById('result-ring');
  ring.style.setProperty('--pct', (pct / 100 * 360) + 'deg');
  document.getElementById('result-score-text').textContent = pct + '%';
  document.getElementById('result-title').textContent =
    pct === 100 ? '완벽해요! 🎉' : pct >= 80 ? '훌륭해요! 👏' : pct >= 60 ? '잘 했어요! 💪' : '더 연습해봐요 📚';
  document.getElementById('result-sub').textContent = `${total}문제 중 ${correct}개 정답`;

  const wl = document.getElementById('result-wrong-list');
  if (quizWrong.length) {
    wl.innerHTML = `<h3>틀린 단어 (${quizWrong.length}개) — 오답노트에 추가됨</h3>` +
      quizWrong.map(w => `
        <div class="rwl-item">
          <div class="rwl-word">${w.word}</div>
          <div class="rwl-hira">${w.hiragana}</div>
          <div class="rwl-meaning">${w.answer}</div>
        </div>
      `).join('');
  } else {
    wl.innerHTML = '';
  }
  showScreen('result-screen');
}

function retryQuiz() { startQuiz(quizCount); }
function confirmQuitQuiz() { if (confirm('퀴즈를 종료할까요?')) showScreen('wordlist-screen'); }

// ═══════════════════════════════════════
//  ACCOUNT
// ═══════════════════════════════════════
function gotoAccount() {
  closeMenu();
  document.getElementById('acc-username').textContent = currentUser?.username || '';
  document.getElementById('acc-nickname').value = currentUser?.nickname || '';
  document.getElementById('acc-cur-pw').value = '';
  document.getElementById('acc-new-pw').value = '';
  showScreen('account-screen');
}

async function saveAccount() {
  const nickname = document.getElementById('acc-nickname').value.trim();
  const curPw = document.getElementById('acc-cur-pw').value;
  const newPw = document.getElementById('acc-new-pw').value;
  const payload = {};
  if (nickname) payload.nickname = nickname;
  if (newPw) { payload.current_password = curPw; payload.new_password = newPw; }
  if (!Object.keys(payload).length) { showToast('변경할 내용을 입력하세요'); return; }
  try {
    const data = await api('PUT', '/api/me', payload);
    if (data.nickname) {
      currentUser.nickname = data.nickname;
      document.getElementById('main-nickname').textContent = data.nickname + '님, 안녕하세요!';
      document.getElementById('menu-nickname').textContent = data.nickname;
    }
    showToast('저장되었습니다', 'success');
  } catch(e) { showToast(e.message, 'error'); }
}

// ═══════════════════════════════════════
//  WRONG NOTE
// ═══════════════════════════════════════
async function gotoWrongNote() {
  closeMenu();
  showScreen('wrongnote-screen');
  document.getElementById('wrongnote-list').innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted)">불러오는 중...</div>';
  try {
    const data = await api('GET', '/api/wrongnote');
    document.getElementById('wrongnote-count').textContent = data.notes.length + '개';
    if (!data.notes.length) {
      document.getElementById('wrongnote-list').innerHTML = '<div class="empty-state"><div class="es-icon">✨</div><p>오답노트가 비어있어요!</p></div>';
      return;
    }
    document.getElementById('wrongnote-list').innerHTML = data.notes.map(n => `
      <div class="wn-card" id="wn-${n.id}">
        <div class="wc-word" style="font-family:'Noto Sans JP',sans-serif;font-size:16px;font-weight:700">${n.word}</div>
        <div class="wc-hira" style="font-family:'Noto Sans JP',sans-serif;font-size:12px;color:var(--text-muted)">${n.hiragana}</div>
        <div class="wc-meaning" style="font-size:13px;text-align:right;color:var(--accent2)">${n.meaning}</div>
        <button class="wn-del" onclick="deleteWrongNote(${n.id})">🗑</button>
      </div>
    `).join('');
  } catch(e) { showToast(e.message, 'error'); }
}

async function deleteWrongNote(id) {
  try {
    await api('DELETE', `/api/wrongnote/${id}`);
    const el = document.getElementById('wn-' + id);
    if (el) el.remove();
    const remaining = document.querySelectorAll('.wn-card').length;
    document.getElementById('wrongnote-count').textContent = remaining + '개';
    if (!remaining) {
      document.getElementById('wrongnote-list').innerHTML = '<div class="empty-state"><div class="es-icon">✨</div><p>오답노트가 비어있어요!</p></div>';
    }
  } catch(e) { showToast(e.message, 'error'); }
}
</script>
</body>
</html>
