<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta name="naver-site-verification" content="4d7db240d088bb206d3e0d0c3f54cf40f87ca16a" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}SoloLeveling Word{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════
   다크 테마 (기본)
════════════════════════════════ */
:root,
[data-theme="dark"] {
  --bg:        #0a0a0f;
  --surface:   #12121a;
  --surface2:  #1a1a26;
  --border:    #2a2a3a;
  --accent:    #22c55e;
  --accent2:   #4ade80;
  --text:      #e8e8f0;
  --muted:     #6b6b8a;
  --danger:    #ff4d6d;
  --success:   #22d3a0;
  --warning:   #fbbf24;
  --radius:    10px;
  --mono:      'Share Tech Mono', monospace;
  --nav-bg:    rgba(10,10,15,.95);
  --shadow:    0 2px 12px rgba(0,0,0,.4);
}

/* ════════════════════════════════
   라이트 테마
════════════════════════════════ */
[data-theme="light"] {
  --bg:        #f4f6f8;
  --surface:   #ffffff;
  --surface2:  #f0f4f0;
  --border:    #d4e4d4;
  --accent:    #16a34a;
  --accent2:   #15803d;
  --text:      #1a2e1a;
  --muted:     #6b7e6b;
  --danger:    #dc2626;
  --success:   #059669;
  --warning:   #d97706;
  --nav-bg:    rgba(244,246,248,.95);
  --shadow:    0 2px 12px rgba(0,0,0,.08);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  background:var(--bg); color:var(--text);
  font-family:'Noto Sans KR', sans-serif;
  min-height:100vh;
  transition: background .25s, color .25s;
}
a { color:inherit; text-decoration:none; }
button { cursor:pointer; font-family:inherit; border:none; background:none; }
input, textarea { font-family:inherit; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

/* ── 상단 네비 ── */
.top-nav {
  position:sticky; top:0; z-index:100;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px; height:56px;
  background:var(--nav-bg); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.nav-logo {
  display:flex; align-items:center; gap:10px;
  font-size:15px; font-weight:700; letter-spacing:.06em;
}
.nav-logo .logo-icon {
  width:30px; height:30px; background:var(--accent);
  border-radius:7px; display:flex; align-items:center;
  justify-content:center; font-size:15px;
}
.nav-right { display:flex; align-items:center; gap:8px; }

/* ── 페이지 헤더 (서브 화면) ── */
.page-header {
  position:sticky; top:0; z-index:50;
  display:flex; align-items:center; gap:14px;
  padding:0 20px; height:54px;
  background:var(--nav-bg); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.back-btn {
  width:34px; height:34px; background:var(--surface);
  border:1px solid var(--border); border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-size:18px; color:var(--text); flex-shrink:0;
}
.page-title { font-size:16px; font-weight:700; font-family:var(--mono); }
.page-sub   { font-size:12px; color:var(--muted); margin-left:auto; }

/* ── 버튼 ── */
.btn-primary {
  display:block; width:100%; padding:13px;
  background:var(--accent); border-radius:var(--radius);
  color:#fff; font-size:15px; font-weight:700;
  letter-spacing:.04em; text-align:center;
  transition:background .2s, transform .15s;
}
.btn-primary:hover { filter:brightness(1.1); transform:translateY(-1px); }
.btn-primary:active { transform:none; }

.btn-ghost {
  display:block; width:100%; padding:12px;
  background:transparent; border:1px solid var(--border);
  border-radius:var(--radius); color:var(--text);
  font-size:14px; text-align:center;
  transition:border-color .2s;
}
.btn-ghost:hover { border-color:var(--accent); }

/* ── 입력 필드 ── */
.field-group { margin-bottom:16px; }
.field-group label {
  display:block; font-size:11px; color:var(--muted);
  letter-spacing:.08em; text-transform:uppercase; margin-bottom:6px;
}
.field-group input {
  width:100%; padding:12px 14px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); color:var(--text); font-size:15px;
  transition:border-color .2s;
}
.field-group input:focus { outline:none; border-color:var(--accent); }

/* ── 카드 ── */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius);
}
.card-hover { transition:border-color .2s, transform .15s; }
.card-hover:hover { border-color:var(--accent); transform:translateX(3px); }

/* ── 에러/성공 ── */
.msg-error   { color:var(--danger);  font-size:13px; text-align:center; margin-top:10px; min-height:18px; }
.msg-success { color:var(--success); font-size:13px; text-align:center; margin-top:10px; }

/* ── 빈 상태 ── */
.empty-state { text-align:center; padding:60px 20px; color:var(--muted); }
.empty-state .ei { font-size:36px; margin-bottom:10px; }

/* ── 메뉴 버튼 (햄버거) ── */
.menu-btn {
  width:36px; height:36px; background:var(--surface);
  border:1px solid var(--border); border-radius:8px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:4px;
}
.menu-btn span { display:block; width:14px; height:2px; background:var(--text); border-radius:1px; }

/* ── 드롭다운 오버레이 ── */
.dropdown-overlay {
  display:none; position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,.45); backdrop-filter:blur(4px);
}
.dropdown-overlay.open { display:block; }
.dropdown-panel {
  position:absolute; top:0; right:0;
  width:240px; height:100%;
  background:var(--surface); border-left:1px solid var(--border);
  display:flex; flex-direction:column; padding-top:56px;
  box-shadow: var(--shadow);
}
.dropdown-close {
  position:absolute; top:14px; right:14px;
  width:30px; height:30px; background:var(--border);
  border-radius:50%; color:var(--text); font-size:14px;
  display:flex; align-items:center; justify-content:center;
}
.dropdown-user { padding:18px 20px; border-bottom:1px solid var(--border); }
.dropdown-user .du-nick { font-size:15px; font-weight:700; }
.dropdown-user .du-id   { font-size:12px; color:var(--muted); margin-top:3px; }

/* 다크모드 토글 (드롭다운 내) */
.dropdown-theme {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 20px; border-bottom:1px solid var(--border);
}
.dropdown-theme-label {
  display:flex; align-items:center; gap:10px;
  font-size:14px; color:var(--text);
}
.dropdown-theme-label .di-icon { font-size:16px; width:20px; }

/* 슬라이드 토글 스위치 */
.theme-switch { position:relative; width:42px; height:24px; flex-shrink:0; }
.theme-switch input { opacity:0; width:0; height:0; }
.theme-slider {
  position:absolute; inset:0; cursor:pointer;
  background:var(--border); border-radius:24px;
  transition:background .25s;
}
.theme-slider:before {
  content:''; position:absolute;
  width:18px; height:18px; border-radius:50%;
  background:#fff; top:3px; left:3px;
  transition:transform .25s;
  box-shadow: 0 1px 4px rgba(0,0,0,.25);
}
.theme-switch input:checked + .theme-slider { background:var(--accent); }
.theme-switch input:checked + .theme-slider:before { transform:translateX(18px); }

.dropdown-item {
  display:flex; align-items:center; gap:12px;
  padding:15px 20px; width:100%; text-align:left;
  color:var(--text); font-size:14px;
  transition:background .15s;
}
.dropdown-item:hover { background:var(--surface2); }
.dropdown-item .di-icon { font-size:16px; width:20px; }
.dropdown-item.danger { color:var(--danger); margin-top:auto; border-top:1px solid var(--border); }

/* ── 토스트 ── */
#toast {
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%) translateY(70px);
  background:var(--surface2); border:1px solid var(--border);
  padding:11px 18px; border-radius:10px; font-size:13px;
  transition:transform .28s; z-index:999; white-space:nowrap;
  pointer-events:none;
}
#toast.show { transform:translateX(-50%) translateY(0); }
#toast.ok  { border-color:var(--success); color:var(--success); }
#toast.err { border-color:var(--danger);  color:var(--danger); }

{% block extra_style %}{% endblock %}
</style>
</head>
<body>

{% block body %}{% endblock %}

<!-- 토스트 -->
<div id="toast"></div>

<script>
/* ── 공통 JS ── */
let _toastTimer;
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = type ? `show ${type}` : 'show';
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show', 'ok', 'err'), 2500);
}

function openMenu()  { document.getElementById('menu-overlay')?.classList.add('open'); }
function closeMenu() { document.getElementById('menu-overlay')?.classList.remove('open'); }

/* ── 다크모드 토글 ── */
(function initTheme() {
  const saved = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  // 체크박스 초기화는 DOM 로드 후
  document.addEventListener('DOMContentLoaded', function() {
    const cb = document.getElementById('theme-toggle');
    if (cb) cb.checked = (saved === 'light');
  });
})();

function toggleTheme(cb) {
  const theme = cb.checked ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('theme', theme);
}
</script>

{% block extra_script %}{% endblock %}
</body>
</html>
